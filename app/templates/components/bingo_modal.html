<div class="modal-overlay">
    <div class="modal-content text-center max-w-xs w-full" style="animation: bounce-scale 0.5s ease-out;">
        <div class="text-6xl mb-4" style="animation: float 3s ease-in-out infinite;">🎉</div>
        <h2 class="text-4xl font-bold mb-2" style="background: linear-gradient(135deg, #ff5a8a 0%, #8b4dff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">BINGO!</h2>
        <p class="text-white-80 mb-8 text-lg">You completed a line!</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-primary w-full">
            Keep Playing
        </button>
    </div>
</div>
