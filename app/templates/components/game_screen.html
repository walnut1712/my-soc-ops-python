<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-white-10">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-white-60 hover:text-white text-sm px-3 py-2 rounded-lg transition-colors">
            ← Back
        </button>
        <h1 class="font-bold text-white">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <div class="text-center text-white-60 text-sm py-3 px-4">
        Find someone who matches each square
    </div>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-gradient-to-r from-rose-500 to-purple-500 text-center py-3 font-semibold text-sm text-white" style="animation: pulse-glow 1s ease-in-out;">
        ✨ BINGO! You got a line!
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-4">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
