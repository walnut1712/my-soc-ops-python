<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-2 text-center border border-white-10 rounded-lg transition-all duration-200 select-none min-h-[64px] text-xs leading-tight font-medium
        {%- if square.is_marked %}
            {%- if is_winning %} bg-gradient-to-br from-rose-500 to-purple-600 text-white glow-rose
            {%- else %} bg-gradient-to-br from-purple-500 to-rose-500 text-white glow-rose
            {%- endif %}
        {%- else %} bg-glass text-white hover:bg-white-15 active:bg-white-20
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm opacity-75{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span>{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-1 right-1 text-white text-xs" style="opacity: 0.8;">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
