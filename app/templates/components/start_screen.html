<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6">
    <div class="text-center max-w-sm" style="animation: slide-in 0.6s ease-out;">
        <!-- Title with gradient text -->
        <div class="mb-2">
            <h1 class="text-5xl font-bold mb-2" style="background: linear-gradient(135deg, #ff5a8a 0%, #8b4dff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Soc Ops</h1>
            <p class="text-white-60 text-lg tracking-wide">Social Bingo for Connection</p>
        </div>

        <!-- Rules card with glassmorphism -->
        <div class="bg-glass rounded-2xl p-6 mb-8" style="animation: slide-in 0.7s ease-out 0.1s backwards;">
            <h2 class="font-bold text-white mb-4 text-lg">How to Play</h2>
            <ul class="text-left text-white-80 text-sm space-y-3">
                <li class="flex items-start">
                    <span class="text-rose-500 mr-3 mt-0.5">✦</span>
                    <span>Find people who match the questions on your card</span>
                </li>
                <li class="flex items-start">
                    <span class="text-rose-500 mr-3 mt-0.5">✦</span>
                    <span>Tap a square when you find a match</span>
                </li>
                <li class="flex items-start">
                    <span class="text-rose-500 mr-3 mt-0.5">✦</span>
                    <span>Get 5 in a row to win!</span>
                </li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-primary w-full"
            style="animation: slide-in 0.7s ease-out 0.2s backwards;">
            🎮 Start Game
        </button>
    </div>
</div>
</div>
